 LogLevel 3
 
 LogDir "default"
 
 DefaultRate 0

 DefaultPitch   10
 DefaultPitchRange   0
 
 DefaultVolume 50
 
 DefaultLanguage   en-GB

 DefaultVoiceType  "FEMALE1"
 
 # DefaultPunctuationMode "none"
 
 SymbolsPreproc "char"
 
 SymbolsPreprocFile "gender-neutral.dic"
 SymbolsPreprocFile "font-variants.dic"
 SymbolsPreprocFile "symbols.dic"
 SymbolsPreprocFile "emojis.dic"
 SymbolsPreprocFile "orca.dic"
 SymbolsPreprocFile "orca-chars.dic"
 
 # DefaultCapLetRecognition  "none"
 
 # DefaultSpelling  Off
 
 AudioOutputMethod "pulse"

 AudioPulseDevice "default"
 
 AddModule "espeak-ng" "sd_espeak-ng" "espeak-ng.conf"
 #AddModule "espeak-ng-mbrola-generic" "sd_generic"   "espeak-ng-mbrola-generic.conf"
 
 AddModule "piper-tts-generic" "sd_generic" "piper-tts-generic.conf"
 
 DefaultModule "piper-tts-generic"
 
 LanguageDefaultModule "en" "piper-tts-generic"
 LanguageDefaultModule "en-GB" "piper-tts-generic"
 LanguageDefaultModule "hu" "piper-tts-generic"
 LanguageDefaultModule "hu-HU" "piper-tts-generic"
 
 Include "clients/*.conf"
